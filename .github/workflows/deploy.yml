# Build the site and publish to GitHub Pages.
#
# REQUIRED: Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions".
# If Source is "Deploy from a branch" (e.g. main /), GitHub serves repo-root index.html
# with <script src="/src/main.jsx"> — that file is not on Pages → infinite "Loading…".
# Fix: set Source to GitHub Actions only, then re-run this workflow.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Until deploy-pages ships a node24 runtime; see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
        run: |
          OWNER="${{ github.repository_owner }}"
          NAME="${{ github.event.repository.name }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            export BASE_PATH=/
          else
            export BASE_PATH="/$NAME/"
          fi
          npm run build
          cp dist/index.html dist/404.html

      - name: Verify dist is a Vite production build
        run: |
          if grep -q '/src/main.jsx' dist/index.html; then
            echo '::error::dist/index.html still references /src/main.jsx — build output is invalid.'
            exit 1
          fi
          if ! grep -qE 'src="[^"]*assets/index-[^"]+\.js"' dist/index.html; then
            echo '::error::dist/index.html has no hashed assets/index-*.js script tag.'
            cat dist/index.html
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
